---
# Namespace (optional, for organization)
apiVersion: v1
kind: Namespace
metadata:
  name: mobile-observability

---
# ConfigMap containing the OTEL Collector configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: mobile-observability
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128

      batch:
        timeout: 10s
        send_batch_size: 1024
        send_batch_max_size: 2048

      # Add resource attributes for better observability
      resource:
        attributes:
          - key: service.name
            value: mobile-observability-demo
            action: upsert
          - key: deployment.environment
            value: demo
            action: upsert

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    exporters:
      debug:
        verbosity: detailed
        sampling_initial: 5
        sampling_thereafter: 200

      logging:
        verbosity: detailed
        sampling_initial: 5
        sampling_thereafter: 200

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [debug, logging]

        # Also handle traces and metrics if needed later
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [debug, logging]

        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [debug, logging]

      telemetry:
        logs:
          level: info
        metrics:
          address: 0.0.0.0:8888

---
# Deployment for the OTEL Collector
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: mobile-observability
  labels:
    app: otel-collector
    component: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
        component: collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.93.0
        command:
          - "/otelcol-contrib"
          - "--config=/conf/collector.yaml"
        ports:
        - name: otlp-grpc
          containerPort: 4317
          protocol: TCP
        - name: otlp-http
          containerPort: 4318
          protocol: TCP
        - name: metrics
          containerPort: 8888
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /conf
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 13133
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 13133
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: otel-collector-config
          items:
          - key: collector.yaml
            path: collector.yaml

---
# Service to expose the OTEL Collector
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: mobile-observability
  labels:
    app: otel-collector
spec:
  type: ClusterIP
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP
  - name: metrics
    port: 8888
    targetPort: 8888
    protocol: TCP
  selector:
    app: otel-collector
