---
# PersistentVolumeClaim for SQLite database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gateway-data
  namespace: mobile-observability
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# Deployment for the Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-gateway
  namespace: mobile-observability
  labels:
    app: otel-gateway
    component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-gateway
  template:
    metadata:
      labels:
        app: otel-gateway
        component: gateway
    spec:
      containers:
      - name: gateway
        image: otel-gateway:latest
        imagePullPolicy: Never  # For local k3s development
        env:
        - name: PORT
          value: "8080"
        - name: DB_PATH
          value: "/data/gateway.db"
        - name: OTEL_COLLECTOR_ENDPOINT
          value: "otel-collector.mobile-observability.svc.cluster.local:4317"
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: gateway-data

---
# Service to expose the Gateway
apiVersion: v1
kind: Service
metadata:
  name: otel-gateway
  namespace: mobile-observability
  labels:
    app: otel-gateway
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: otel-gateway
