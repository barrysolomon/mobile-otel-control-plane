receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    timeout: 10s
    send_batch_size: 100
    send_batch_max_size: 200

  # Add resource attributes for better observability
  resource:
    attributes:
      - key: deployment.environment
        value: local-docker
        action: upsert

exporters:
  # Debug exporter - prints to console
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

  # Logging exporter - structured logs
  logging:
    verbosity: detailed

  # Jaeger exporter - sends traces to Jaeger UI
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  pipelines:
    # Logs pipeline
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [debug, logging]

    # Traces pipeline (sent to Jaeger for visualization)
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [debug, logging, otlp/jaeger]

    # Metrics pipeline
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [debug, logging]

  # Collector telemetry
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888

  # Extensions for health check
  extensions: [health_check]

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
