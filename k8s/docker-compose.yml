# Docker Compose configuration for local OTEL Collector development
# This spins up an OTEL Collector and Jaeger UI for testing your mobile app locally
#
# Usage:
#   docker-compose up -d                  # Start with standard collector (no policy processor)
#   docker-compose --profile mobile up -d # Start with otelcol-mobile (mobilepolicyprocessor)
#   docker-compose logs -f                # View logs
#   docker-compose down                   # Stop services
#
# Services:
#   - otel-collector: Standard OTel Collector (no policy processor) — always started
#   - otelcol-mobile: Custom collector with mobilepolicyprocessor — started with --profile mobile
#   - Jaeger UI: Visualizes traces at http://localhost:16686
#
# To build the otelcol-mobile image before running:
#   docker build -t otelcol-mobile:latest ../collector-processor/

services:
  # Standard OpenTelemetry Collector (no custom processor, always available)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.93.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-docker.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver (used by mobile app)
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics
      - "13133:13133" # Health check
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - otel-network

  # otelcol-mobile — custom collector with mobilepolicyprocessor embedded.
  # Build first: docker build -t otelcol-mobile:latest ../collector-processor/
  # Start with: docker-compose --profile mobile up -d otelcol-mobile
  # It replaces otel-collector on the same ports — do not run both at once.
  otelcol-mobile:
    profiles: [mobile]
    image: otelcol-mobile:latest
    container_name: otelcol-mobile
    volumes:
      - ../collector-processor/default-config.yaml:/app/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (Android SDK default)
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics
      - "13133:13133" # Health check
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - otel-network

  # Jaeger (for viewing traces - optional but helpful)
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC receiver (for collector to send data)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - otel-network

networks:
  otel-network:
    driver: bridge
