name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  gateway-build:
    name: Gateway Build & Vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: gateway/go.sum

      - name: Build gateway
        run: |
          cd gateway
          go build ./...

      - name: Run go vet
        run: |
          cd gateway
          go vet ./...

  frontend-typecheck:
    name: Frontend Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: control-plane-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd control-plane-ui
          npm ci

      - name: TypeScript typecheck
        run: |
          cd control-plane-ui
          npx tsc --noEmit

      - name: ESLint
        run: |
          cd control-plane-ui
          npm run lint

  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    needs: frontend-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: control-plane-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd control-plane-ui
          npm ci

      - name: Build
        run: |
          cd control-plane-ui
          npm run build
